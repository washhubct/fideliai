    <path d="M0,-24 C16,-40 40,-36 48,-20 C56,-4 48,14 32,20 C20,24 8,18 0,8 C-4,2 -4,-4 0,-10"
          fill="none" stroke="url(#wl-stroke-right)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M-2,-12 C4,-20 12,-24 20,-20 C28,-16 32,-6 28,4 C24,12 16,18 8,16"
          fill="none" stroke="url(#wl-stroke-left)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
  </g>

  <!-- Wordmark -->
  <text x="80" y="62" font-family="Inter, sans-serif" font-size="38" font-weight="700" fill="#1E293B">Fideli</text>
  <text x="248" y="62" font-family="Inter, sans-serif" font-size="38" font-weight="800" fill="url(#wl-ai)">AI</text>
