<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120">
  <!-- Concept 2: Cuore digitale — Fidelizzazione + Tecnologia -->
  <defs>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1"/>
      <stop offset="100%" style="stop-color:#8B5CF6"/>
    </linearGradient>
    <linearGradient id="grad2g" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10B981"/>
      <stop offset="100%" style="stop-color:#6366F1"/>
    </linearGradient>
  </defs>

  <!-- Heart shape made of geometric/digital blocks -->
  <g transform="translate(10, 12)">
    <!-- Left heart half -->
    <rect x="16" y="16" width="14" height="14" rx="3" fill="#6366F1" opacity="0.3"/>
    <rect x="2" y="30" width="14" height="14" rx="3" fill="#6366F1" opacity="0.5"/>
    <rect x="16" y="30" width="14" height="14" rx="3" fill="#6366F1" opacity="0.8"/>
    <rect x="30" y="30" width="14" height="14" rx="3" fill="#6366F1"/>
    <rect x="16" y="44" width="14" height="14" rx="3" fill="#6366F1" opacity="0.9"/>
    <rect x="30" y="44" width="14" height="14" rx="3" fill="#8B5CF6"/>
    <rect x="30" y="58" width="14" height="14" rx="3" fill="#8B5CF6" opacity="0.7"/>

    <!-- Right heart half -->
    <rect x="48" y="16" width="14" height="14" rx="3" fill="#6366F1" opacity="0.3"/>
    <rect x="48" y="30" width="14" height="14" rx="3" fill="#6366F1"/>
    <rect x="62" y="30" width="14" height="14" rx="3" fill="#6366F1" opacity="0.5"/>
    <rect x="48" y="44" width="14" height="14" rx="3" fill="#8B5CF6"/>
    <rect x="34" y="44" width="14" height="14" rx="3" fill="#8B5CF6"/>
    <rect x="44" y="58" width="14" height="14" rx="3" fill="#8B5CF6" opacity="0.7"/>
    <rect x="38" y="72" width="14" height="14" rx="3" fill="#8B5CF6" opacity="0.4"/>

    <!-- AI sparkle accent -->
    <circle cx="68" cy="20" r="3" fill="#10B981"/>
    <circle cx="76" cy="14" r="2" fill="#10B981" opacity="0.6"/>
    <circle cx="74" cy="26" r="1.5" fill="#10B981" opacity="0.4"/>
  </g>

  <!-- Wordmark -->
  <text x="105" y="72" font-family="Inter, sans-serif" font-size="42" font-weight="800" fill="#1E1B4B">Fideli</text>
  <text x="290" y="72" font-family="Inter, sans-serif" font-size="42" font-weight="800" fill="url(#grad2)">AI</text>
</svg>
