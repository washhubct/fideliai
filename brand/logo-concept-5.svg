<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120">
  <!-- Concept 5: Stella/punti convergenti — Loyalty rewards + AI convergenza -->
  <defs>
    <linearGradient id="grad5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1"/>
      <stop offset="100%" style="stop-color:#8B5CF6"/>
    </linearGradient>
    <linearGradient id="grad5g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981"/>
      <stop offset="100%" style="stop-color:#34D399"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="8" y="15" width="85" height="85" rx="22" fill="url(#grad5)"/>

  <!-- Central star made of converging points -->
  <g transform="translate(50, 57)">
    <!-- Star rays -->
    <line x1="0" y1="-24" x2="0" y2="-10" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
    <line x1="22" y1="-8" x2="10" y2="-3" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
    <line x1="14" y1="20" x2="6" y2="8" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
    <line x1="-14" y1="20" x2="-6" y2="8" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
    <line x1="-22" y1="-8" x2="-10" y2="-3" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.8"/>

    <!-- Center glow -->
    <circle cx="0" cy="0" r="7" fill="white" opacity="0.95"/>
    <circle cx="0" cy="0" r="4" fill="url(#grad5g)"/>

    <!-- Outer dots (loyalty points) -->
    <circle cx="0" cy="-28" r="3" fill="white" opacity="0.7"/>
    <circle cx="26" cy="-10" r="3" fill="white" opacity="0.6"/>
    <circle cx="16" cy="23" r="3" fill="white" opacity="0.5"/>
    <circle cx="-16" cy="23" r="3" fill="white" opacity="0.5"/>
    <circle cx="-26" cy="-10" r="3" fill="white" opacity="0.6"/>
  </g>

  <!-- Wordmark -->
  <text x="110" y="72" font-family="Inter, sans-serif" font-size="42" font-weight="800" fill="#1E1B4B">Fideli</text>
  <text x="295" y="72" font-family="Inter, sans-serif" font-size="42" font-weight="800" fill="url(#grad5)">AI</text>
</svg>
