<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- FideliAI Icon Only — Heart + Infinity -->
  <defs>
    <linearGradient id="heart-fill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8B4B8"/>
      <stop offset="100%" style="stop-color:#D4A0A6"/>
    </linearGradient>
    <linearGradient id="infinity-left" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0EA5E9"/>
      <stop offset="100%" style="stop-color:#6366F1"/>
    </linearGradient>
    <linearGradient id="infinity-right" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366F1"/>
      <stop offset="100%" style="stop-color:#8B5CF6"/>
    </linearGradient>
    <linearGradient id="heart-outline" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0EA5E9"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>
  </defs>

  <g transform="translate(100, 95)">
    <!-- Heart shape (left side) -->
    <path d="M-48,-20 C-48,-38 -28,-46 -12,-34 L0,-24 L0,-10 C-16,-24 -28,-28 -36,-20 C-44,-12 -42,2 -28,16 L0,40 L4,36"
          fill="none" stroke="url(#heart-outline)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Heart fill (peachy interior) -->
    <path d="M-40,-18 C-40,-30 -26,-36 -14,-28 L0,-16 L0,0 C-12,-14 -22,-20 -30,-16 C-36,-12 -36,-2 -24,12 L0,34"
          fill="url(#heart-fill)" opacity="0.5"/>

    <!-- Infinity loop right side -->
    <path d="M0,-24 C16,-40 40,-36 48,-20 C56,-4 48,14 32,20 C20,24 8,18 0,8 C-4,2 -4,-4 0,-10"
          fill="none" stroke="url(#infinity-right)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Infinity crossover accent -->
    <path d="M-2,-12 C4,-20 12,-24 20,-20 C28,-16 32,-6 28,4 C24,12 16,18 8,16"
          fill="none" stroke="url(#infinity-left)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
  </g>
</svg>
