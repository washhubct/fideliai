<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <!-- FideliAI Social Avatar — Facebook/Instagram profile pic -->
  <defs>
    <linearGradient id="sa-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F8FAFC"/>
      <stop offset="100%" style="stop-color:#F1F5F9"/>
    </linearGradient>
    <linearGradient id="sa-heart-fill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8B4B8"/>
      <stop offset="100%" style="stop-color:#D4A0A6"/>
    </linearGradient>
    <linearGradient id="sa-stroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0EA5E9"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>
    <linearGradient id="sa-right" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366F1"/>
      <stop offset="100%" style="stop-color:#8B5CF6"/>
    </linearGradient>
  </defs>

  <!-- Circle background -->
  <circle cx="200" cy="200" r="195" fill="url(#sa-bg)" stroke="#E2E8F0" stroke-width="2"/>

  <!-- Icon centered -->
  <g transform="translate(200, 185) scale(1.3)">
    <path d="M-48,-20 C-48,-38 -28,-46 -12,-34 L0,-24 L0,-10 C-16,-24 -28,-28 -36,-20 C-44,-12 -42,2 -28,16 L0,40 L4,36"
          fill="none" stroke="url(#sa-stroke)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M-40,-18 C-40,-30 -26,-36 -14,-28 L0,-16 L0,0 C-12,-14 -22,-20 -30,-16 C-36,-12 -36,-2 -24,12 L0,34"
          fill="url(#sa-heart-fill)" opacity="0.5"/>
    <path d="M0,-24 C16,-40 40,-36 48,-20 C56,-4 48,14 32,20 C20,24 8,18 0,8 C-4,2 -4,-4 0,-10"
          fill="none" stroke="url(#sa-right)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M-2,-12 C4,-20 12,-24 20,-20 C28,-16 32,-6 28,4 C24,12 16,18 8,16"
          fill="none" stroke="url(#sa-stroke)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
  </g>
</svg>
