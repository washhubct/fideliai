<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 140">
  <!-- Concept 8: F integrata nella stretta di mano — la F E' la mano -->
  <defs>
    <linearGradient id="grad8" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1"/>
      <stop offset="100%" style="stop-color:#8B5CF6"/>
    </linearGradient>
    <linearGradient id="grad8g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
  </defs>

  <g transform="translate(60, 70)">
    <!-- The F IS the left arm+hand -->
    <!-- Arm (vertical of F) -->
    <path d="M-38,-42 L-38,42 C-38,46 -34,48 -30,48 L-26,48 C-22,48 -20,46 -20,42 L-20,-42 Z"
          fill="url(#grad8)" rx="8"/>

    <!-- Shoulder (top of F) -->
    <path d="M-38,-42 L20,-42 C24,-42 26,-38 26,-34 L26,-32 C26,-28 24,-26 20,-26 L-20,-26 Z"
          fill="url(#grad8)"/>

    <!-- Forearm + Hand extending (middle of F) -->
    <path d="M-20,-10 L8,-10 C12,-10 16,-8 18,-4 L20,0 C22,4 20,8 16,10 L8,12 C4,14 0,12 -2,8 L-20,8 Z"
          fill="url(#grad8)"/>

    <!-- Left hand fingers curling down for grip -->
    <path d="M14,-6 C20,-8 24,-4 22,0 C20,4 16,6 12,4"
          fill="none" stroke="url(#grad8)" stroke-width="5" stroke-linecap="round"/>

    <!-- RIGHT HAND (client/partner) coming from right, emerald -->
    <!-- Forearm -->
    <path d="M50,8 L20,6 C16,6 12,2 12,-2 C12,-6 16,-10 20,-10 L50,-12 Z"
          fill="url(#grad8g)" opacity="0.85"/>

    <!-- Right hand fingers curling up for grip -->
    <path d="M16,8 C10,12 6,10 8,4 C10,0 14,-2 18,0"
          fill="none" stroke="url(#grad8g)" stroke-width="5" stroke-linecap="round"/>

    <!-- Clasp highlight -->
    <ellipse cx="16" cy="0" rx="4" ry="6" fill="white" opacity="0.15"/>

    <!-- Trust/AI sparkles -->
    <circle cx="8" cy="-22" r="3" fill="#10B981" opacity="0.8">
      <animate attributeName="opacity" values="0.4;0.9;0.4" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="16" cy="-28" r="2" fill="#10B981" opacity="0.5"/>
    <circle cx="0" cy="-28" r="2" fill="#8B5CF6" opacity="0.5"/>
  </g>

  <!-- Wordmark -->
  <text x="130" y="84" font-family="Inter, sans-serif" font-size="50" font-weight="800" fill="#1E1B4B">Fideli</text>
  <text x="365" y="84" font-family="Inter, sans-serif" font-size="50" font-weight="800" fill="url(#grad8)">AI</text>
</svg>
