<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <!-- Social media avatar - quadrato, icon-only -->
  <defs>
    <linearGradient id="gradS" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1"/>
      <stop offset="100%" style="stop-color:#8B5CF6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" rx="80" fill="url(#gradS)"/>

  <!-- Shield with AI nodes (concept 1 enlarged) -->
  <g transform="translate(200, 185) scale(3.2)">
    <path d="M0,-28 L30,-15 L30,12 C30,32 16,45 0,50 C-16,45 -30,32 -30,12 L-30,-15 Z"
          fill="white" opacity="0.15"/>
    <path d="M0,-24 L26,-12 L26,10 C26,28 14,40 0,45 C-14,40 -26,28 -26,10 L-26,-12 Z"
          fill="none" stroke="white" stroke-width="2" opacity="0.9"/>

    <!-- Neural nodes -->
    <circle cx="0" cy="-6" r="5" fill="white" opacity="0.95"/>
    <circle cx="-12" cy="8" r="3.5" fill="white" opacity="0.7"/>
    <circle cx="12" cy="8" r="3.5" fill="white" opacity="0.7"/>
    <circle cx="-7" cy="22" r="3" fill="white" opacity="0.5"/>
    <circle cx="7" cy="22" r="3" fill="white" opacity="0.5"/>

    <!-- Connections -->
    <line x1="0" y1="-6" x2="-12" y2="8" stroke="white" stroke-width="1.5" opacity="0.4"/>
    <line x1="0" y1="-6" x2="12" y2="8" stroke="white" stroke-width="1.5" opacity="0.4"/>
    <line x1="-12" y1="8" x2="-7" y2="22" stroke="white" stroke-width="1" opacity="0.3"/>
    <line x1="12" y1="8" x2="7" y2="22" stroke="white" stroke-width="1" opacity="0.3"/>

    <!-- AI sparkle -->
    <circle cx="20" cy="-18" r="3" fill="#10B981"/>
    <circle cx="26" cy="-22" r="2" fill="#10B981" opacity="0.6"/>
  </g>

  <!-- Text "F" below -->
  <text x="200" y="340" font-family="Inter, sans-serif" font-size="50" font-weight="800" fill="white" text-anchor="middle" opacity="0.9">FideliAI</text>
</svg>
