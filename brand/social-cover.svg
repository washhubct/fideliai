<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500">
  <!-- Social media cover/banner - 3:1 ratio -->
  <defs>
    <linearGradient id="gradC" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E1B4B"/>
      <stop offset="50%" style="stop-color:#312E81"/>
      <stop offset="100%" style="stop-color:#4F46E5"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1500" height="500" fill="url(#gradC)"/>

  <!-- Decorative circles -->
  <circle cx="1300" cy="100" r="300" fill="#6366F1" opacity="0.15"/>
  <circle cx="200" cy="400" r="200" fill="#10B981" opacity="0.08"/>

  <!-- Shield icon -->
  <g transform="translate(350, 250) scale(2.5)">
    <path d="M0,-28 L26,-12 L26,10 C26,28 14,40 0,45 C-14,40 -26,28 -26,10 L-26,-12 Z"
          fill="none" stroke="white" stroke-width="2" opacity="0.8"/>
    <circle cx="0" cy="-6" r="5" fill="white" opacity="0.9"/>
    <circle cx="-12" cy="8" r="3.5" fill="white" opacity="0.6"/>
    <circle cx="12" cy="8" r="3.5" fill="white" opacity="0.6"/>
    <line x1="0" y1="-6" x2="-12" y2="8" stroke="white" stroke-width="1.5" opacity="0.4"/>
    <line x1="0" y1="-6" x2="12" y2="8" stroke="white" stroke-width="1.5" opacity="0.4"/>
    <circle cx="20" cy="-18" r="3" fill="#10B981"/>
  </g>

  <!-- Wordmark -->
  <text x="520" y="230" font-family="Inter, sans-serif" font-size="80" font-weight="800" fill="white">FideliAI</text>

  <!-- Tagline -->
  <text x="520" y="300" font-family="Inter, sans-serif" font-size="28" font-weight="400" fill="white" opacity="0.7">Fidelizza i tuoi clienti con l'Intelligenza Artificiale</text>

  <!-- Feature pills -->
  <g transform="translate(520, 340)">
    <rect x="0" y="0" width="140" height="36" rx="18" fill="white" opacity="0.15"/>
    <text x="70" y="24" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="white" text-anchor="middle">Card Digitale</text>

    <rect x="160" y="0" width="160" height="36" rx="18" fill="white" opacity="0.15"/>
    <text x="240" y="24" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="white" text-anchor="middle">Punti e Premi</text>

    <rect x="340" y="0" width="120" height="36" rx="18" fill="white" opacity="0.15"/>
    <text x="400" y="24" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="white" text-anchor="middle">AI Agent</text>

    <rect x="480" y="0" width="150" height="36" rx="18" fill="white" opacity="0.15"/>
    <text x="555" y="24" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="white" text-anchor="middle">CRM Clienti</text>
  </g>
</svg>
