<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120">
  <!-- Concept 4: Diamante sfaccettato moderno — Premium e fiducia -->
  <defs>
    <linearGradient id="grad4a" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1"/>
      <stop offset="100%" style="stop-color:#4F46E5"/>
    </linearGradient>
    <linearGradient id="grad4b" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818CF8"/>
      <stop offset="100%" style="stop-color:#6366F1"/>
    </linearGradient>
    <linearGradient id="grad4c" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#A5B4FC"/>
      <stop offset="100%" style="stop-color:#6366F1"/>
    </linearGradient>
    <linearGradient id="grad4d" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
  </defs>

  <!-- Diamond shape - faceted -->
  <g transform="translate(50, 60)">
    <!-- Top facets -->
    <polygon points="0,-42 -22,-14 0,-8" fill="url(#grad4c)"/>
    <polygon points="0,-42 22,-14 0,-8" fill="url(#grad4b)"/>
    <polygon points="-22,-14 -38,-14 -22,-8" fill="#818CF8" opacity="0.6"/>
    <polygon points="22,-14 38,-14 22,-8" fill="#4F46E5" opacity="0.8"/>

    <!-- Bottom facets -->
    <polygon points="-38,-14 0,42 0,-8 -22,-8" fill="url(#grad4a)"/>
    <polygon points="38,-14 0,42 0,-8 22,-8" fill="#4F46E5"/>

    <!-- Sparkle accent -->
    <circle cx="10" cy="-30" r="2.5" fill="white" opacity="0.8"/>
    <circle cx="16" cy="-24" r="1.5" fill="white" opacity="0.5"/>
  </g>

  <!-- Wordmark -->
  <text x="105" y="72" font-family="Inter, sans-serif" font-size="42" font-weight="800" fill="#1E1B4B">Fideli</text>
  <text x="290" y="72" font-family="Inter, sans-serif" font-size="42" font-weight="800" fill="url(#grad4a)">AI</text>
</svg>
