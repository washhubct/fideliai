<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 140">
  <!-- Concept 6: F che stringe una mano — Fiducia, partnership, loyalty -->
  <defs>
    <linearGradient id="grad6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1"/>
      <stop offset="100%" style="stop-color:#8B5CF6"/>
    </linearGradient>
    <linearGradient id="grad6g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981"/>
      <stop offset="100%" style="stop-color:#34D399"/>
    </linearGradient>
  </defs>

  <g transform="translate(55, 70)">
    <!-- F letter as left hand/arm -->
    <!-- Vertical bar of F (arm) -->
    <rect x="-35" y="-45" width="14" height="90" rx="7" fill="url(#grad6)"/>
    <!-- Top bar of F -->
    <rect x="-35" y="-45" width="45" height="12" rx="6" fill="url(#grad6)"/>
    <!-- Middle bar of F (extends into handshake) -->
    <rect x="-35" y="-12" width="35" height="11" rx="5.5" fill="url(#grad6)"/>

    <!-- Left hand (from F) - extends from middle bar -->
    <path d="M-2,-12 C8,-14 14,-10 18,-6 C22,-2 22,2 20,6 L14,4 C16,1 15,-2 12,-5 C9,-8 4,-10 -2,-8 Z"
          fill="url(#grad6)"/>
    <!-- Left thumb -->
    <path d="M8,-8 C12,-12 18,-12 20,-8 C22,-4 18,-2 14,-4 Z"
          fill="#4F46E5"/>
    <!-- Left fingers wrapping -->
    <ellipse cx="16" cy="0" rx="8" ry="5" fill="url(#grad6)" transform="rotate(-15, 16, 0)"/>

    <!-- Right hand (partner/client hand) -->
    <path d="M40,-6 C34,-10 28,-10 22,-6 C18,-2 18,4 22,8 L16,6 C12,2 14,-4 18,-8 C24,-14 34,-14 40,-8 Z"
          fill="url(#grad6g)"/>
    <!-- Right hand palm -->
    <ellipse cx="18" cy="2" rx="9" ry="6" fill="url(#grad6g)" transform="rotate(15, 18, 2)"/>
    <!-- Right thumb -->
    <path d="M26,6 C30,10 28,14 24,12 C20,10 22,6 26,6 Z"
          fill="#059669"/>

    <!-- Handshake clasp (overlapping area) -->
    <ellipse cx="18" cy="0" rx="6" ry="4.5" fill="#4F46E5" opacity="0.3" transform="rotate(-5, 18, 0)"/>

    <!-- Small sparkle/trust dots -->
    <circle cx="30" cy="-20" r="2.5" fill="#10B981" opacity="0.7"/>
    <circle cx="36" cy="-26" r="1.5" fill="#10B981" opacity="0.4"/>
    <circle cx="24" cy="-26" r="1.5" fill="#6366F1" opacity="0.4"/>
  </g>

  <!-- Wordmark -->
  <text x="120" y="82" font-family="Inter, sans-serif" font-size="48" font-weight="800" fill="#1E1B4B">Fideli</text>
  <text x="340" y="82" font-family="Inter, sans-serif" font-size="48" font-weight="800" fill="url(#grad6)">AI</text>
</svg>
