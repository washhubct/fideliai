<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120">
  <!-- Concept 3: F monogram con orbite AI — Elegante e tech -->
  <defs>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1"/>
      <stop offset="100%" style="stop-color:#8B5CF6"/>
    </linearGradient>
  </defs>

  <!-- Circular background -->
  <circle cx="50" cy="60" r="45" fill="url(#grad3)"/>

  <!-- F letter -->
  <text x="32" y="80" font-family="Inter, sans-serif" font-size="55" font-weight="800" fill="white">F</text>

  <!-- AI orbit rings -->
  <ellipse cx="50" cy="60" rx="42" ry="18" fill="none" stroke="#10B981" stroke-width="2" opacity="0.6"
           transform="rotate(-30, 50, 60)"/>
  <ellipse cx="50" cy="60" rx="42" ry="18" fill="none" stroke="#10B981" stroke-width="1.5" opacity="0.3"
           transform="rotate(30, 50, 60)"/>

  <!-- Orbit dots (electrons / data points) -->
  <circle cx="88" cy="48" r="4" fill="#10B981"/>
  <circle cx="14" cy="72" r="3" fill="#10B981" opacity="0.7"/>
  <circle cx="70" cy="88" r="3.5" fill="#10B981" opacity="0.5"/>

  <!-- Wordmark -->
  <text x="110" y="72" font-family="Inter, sans-serif" font-size="42" font-weight="800" fill="#1E1B4B">Fideli</text>
  <text x="295" y="72" font-family="Inter, sans-serif" font-size="42" font-weight="800" fill="url(#grad3)">AI</text>
</svg>
