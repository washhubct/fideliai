<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120">
  <!-- Concept 1: Shield + Neural Network — Protezione e intelligenza -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1"/>
      <stop offset="100%" style="stop-color:#8B5CF6"/>
    </linearGradient>
    <linearGradient id="grad1b" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981"/>
      <stop offset="100%" style="stop-color:#34D399"/>
    </linearGradient>
  </defs>

  <!-- Shield icon with AI nodes -->
  <path d="M50 15 L85 30 L85 60 C85 82 68 98 50 105 C32 98 15 82 15 60 L15 30 Z"
        fill="url(#grad1)" rx="4"/>

  <!-- Neural dots inside shield -->
  <circle cx="50" cy="45" r="6" fill="white" opacity="0.95"/>
  <circle cx="35" cy="60" r="4" fill="white" opacity="0.7"/>
  <circle cx="65" cy="60" r="4" fill="white" opacity="0.7"/>
  <circle cx="42" cy="78" r="3.5" fill="white" opacity="0.6"/>
  <circle cx="58" cy="78" r="3.5" fill="white" opacity="0.6"/>

  <!-- Neural connections -->
  <line x1="50" y1="45" x2="35" y2="60" stroke="white" stroke-width="1.5" opacity="0.5"/>
  <line x1="50" y1="45" x2="65" y2="60" stroke="white" stroke-width="1.5" opacity="0.5"/>
  <line x1="35" y1="60" x2="42" y2="78" stroke="white" stroke-width="1.5" opacity="0.4"/>
  <line x1="65" y1="60" x2="58" y2="78" stroke="white" stroke-width="1.5" opacity="0.4"/>
  <line x1="35" y1="60" x2="58" y2="78" stroke="white" stroke-width="1" opacity="0.3"/>
  <line x1="65" y1="60" x2="42" y2="78" stroke="white" stroke-width="1" opacity="0.3"/>

  <!-- Wordmark -->
  <text x="105" y="72" font-family="Inter, sans-serif" font-size="42" font-weight="800" fill="#1E1B4B">Fideli</text>
  <text x="290" y="72" font-family="Inter, sans-serif" font-size="42" font-weight="800" fill="url(#grad1)">AI</text>
</svg>
