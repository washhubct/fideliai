<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 140">
  <!-- Concept 7: F + Handshake pulito e geometrico -->
  <defs>
    <linearGradient id="grad7" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1"/>
      <stop offset="100%" style="stop-color:#8B5CF6"/>
    </linearGradient>
    <linearGradient id="grad7g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981"/>
      <stop offset="100%" style="stop-color:#34D399"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="8" y="10" width="110" height="110" rx="28" fill="url(#grad7)"/>

  <g transform="translate(63, 65)">
    <!-- F structure in white -->
    <!-- Vertical stroke -->
    <rect x="-32" y="-38" width="12" height="76" rx="6" fill="white"/>
    <!-- Top horizontal -->
    <rect x="-32" y="-38" width="42" height="11" rx="5.5" fill="white"/>

    <!-- Middle horizontal becomes the extending arm -->
    <rect x="-32" y="-8" width="28" height="10" rx="5" fill="white"/>

    <!-- Handshake from middle bar -->
    <!-- Left hand (from F, white) -->
    <path d="M-6,-8 Q2,-16 12,-10 Q18,-6 16,0 Q14,6 8,4 Q2,2 -4,-2 Z"
          fill="white" opacity="0.95"/>

    <!-- Right hand (green, partner) -->
    <path d="M30,-4 Q22,-14 12,-10 Q6,-6 8,0 Q10,6 16,4 Q22,2 28,0 Z"
          fill="#10B981"/>

    <!-- Grip overlap -->
    <ellipse cx="12" cy="-2" rx="5" ry="4" fill="white" opacity="0.3"/>

    <!-- Trust sparkle -->
    <circle cx="22" cy="-22" r="3" fill="#10B981"/>
    <circle cx="28" cy="-28" r="2" fill="#10B981" opacity="0.5"/>
  </g>

  <!-- Wordmark -->
  <text x="138" y="82" font-family="Inter, sans-serif" font-size="48" font-weight="800" fill="#1E1B4B">Fideli</text>
  <text x="358" y="82" font-family="Inter, sans-serif" font-size="48" font-weight="800" fill="url(#grad7)">AI</text>
</svg>
