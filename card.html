<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FidelAI — La tua card fedeltà</title>
    <meta name="description" content="La tua card fedeltà digitale: visualizza punti, premi disponibili e storico transazioni.">
    <meta name="robots" content="noindex, nofollow">

    <!-- Open Graph -->
    <meta property="og:title" content="FidelAI — La tua card fedeltà">
    <meta property="og:description" content="La tua card fedeltà digitale: visualizza punti, premi disponibili e storico transazioni.">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1E1B4B">
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💎</text></svg>">
<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-WQHQZPV865"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-WQHQZPV865');
</script>
</head>
<body>

    <div class="card-app">
        <div class="card-container">

            <!-- Header -->
            <div class="card-header">
                <img id="card-merchant-logo" src="" alt="" style="display:none;max-height:64px;max-width:180px;margin:0 auto 12px;border-radius:8px;background:#fff;padding:4px">
                <p class="card-merchant" id="card-merchant-name">FidelAI</p>
                <h1>La tua Card Fedeltà</h1>
            </div>

            <!-- Loyalty Card -->
            <div class="loyalty-card">
                <div class="card-customer-name" id="card-customer-name">Ospite</div>
                <div class="card-level" id="card-level">Bronze</div>

                <div class="card-points-display">
                    <div class="card-points-value" id="card-points">0</div>
                    <div class="card-points-label">punti fedeltà</div>
                </div>

                <div class="card-progress">
                    <div class="card-progress-fill" id="card-progress-fill" style="width:0%"></div>
                </div>
                <div class="card-progress-text" id="card-progress-text">0 / 500 punti per Silver</div>
            </div>

            <!-- Premi disponibili -->
            <div class="card-section">
                <h3>🎁 Premi disponibili</h3>
                <div id="card-rewards">
                    <div class="reward-item">
                        <div class="reward-info">
                            <h4>Caffè omaggio</h4>
                            <p>100 punti</p>
                        </div>
                        <button class="reward-btn locked">100 pts</button>
                    </div>
                    <div class="reward-item">
                        <div class="reward-info">
                            <h4>Sconto 10%</h4>
                            <p>500 punti</p>
                        </div>
                        <button class="reward-btn locked">500 pts</button>
                    </div>
                    <div class="reward-item">
                        <div class="reward-info">
                            <h4>Prodotto gratis</h4>
                            <p>1.000 punti</p>
                        </div>
                        <button class="reward-btn locked">1000 pts</button>
                    </div>
                </div>
            </div>

            <!-- Storico transazioni -->
            <div class="card-section">
                <h3>📋 Ultime transazioni</h3>
                <div id="card-transactions">
                    <div class="transaction-item">
                        <div class="transaction-info">
                            <h4>Nessuna transazione</h4>
                            <p>Le tue transazioni appariranno qui</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Powered by -->
            <div id="powered-by" style="text-align:center;padding:24px 0;opacity:0.4">
                <p style="font-size:12px;color:white">Powered by FidelAI</p>
            </div>

        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <script>
        // Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyD7kHbNv09Mg-aYfFXSMKrVdi_JqlOuQF4",
            authDomain: "fideliai-app.firebaseapp.com",
            projectId: "fideliai-app",
            storageBucket: "fideliai-app.firebasestorage.app",
            messagingSenderId: "49232775542",
            appId: "1:49232775542:web:e5e5771426462389c5d257"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Parse URL params: card.html?m=MERCHANT_ID&c=CUSTOMER_ID
        const params = new URLSearchParams(window.location.search);
        const merchantId = params.get('m');
        const customerId = params.get('c');
        const isDemo = params.get('demo') === 'true';

        async function loadCard() {
            if (isDemo) {
                renderDemo();
                return;
            }

            if (!merchantId || !customerId) {
                document.querySelector('.card-customer-name').textContent = 'Link non valido';
                return;
            }

            // Load merchant info
            const merchantDoc = await db.collection('merchants').doc(merchantId).get();
            if (merchantDoc.exists) {
                const m = merchantDoc.data();
                document.getElementById('card-merchant-name').textContent = m.businessName || 'FidelAI';
                applyBranding(m);
            }

            // Load customer
            const customerDoc = await db.collection(`merchants/${merchantId}/customers`).doc(customerId).get();
            if (!customerDoc.exists) {
                document.querySelector('.card-customer-name').textContent = 'Cliente non trovato';
                return;
            }

            const customer = customerDoc.data();
            const points = customer.totalPoints || 0;

            document.getElementById('card-customer-name').textContent = customer.name;
            document.getElementById('card-points').textContent = points.toLocaleString('it-IT');

            // Level
            const level = getLevel(points);
            document.getElementById('card-level').textContent = level.name;

            // Progress
            const progress = level.next
                ? Math.min(100, (points / level.next) * 100)
                : 100;
            document.getElementById('card-progress-fill').style.width = progress + '%';
            document.getElementById('card-progress-text').textContent = level.next
                ? `${points.toLocaleString('it-IT')} / ${level.next.toLocaleString('it-IT')} punti per ${level.nextName}`
                : 'Livello massimo raggiunto!';

            // Load rewards
            const rewardsSnap = await db.collection(`merchants/${merchantId}/rewards`)
                .where('active', '==', true)
                .orderBy('pointsCost')
                .get();

            if (!rewardsSnap.empty) {
                const container = document.getElementById('card-rewards');
                container.innerHTML = '';
                rewardsSnap.forEach(doc => {
                    const r = doc.data();
                    const canRedeem = points >= r.pointsCost;
                    container.innerHTML += `
                        <div class="reward-item">
                            <div class="reward-info">
                                <h4>${r.name}</h4>
                                <p>${r.pointsCost.toLocaleString('it-IT')} punti</p>
                            </div>
                            <button class="reward-btn ${canRedeem ? 'available' : 'locked'}">
                                ${canRedeem ? 'Riscatta' : r.pointsCost + ' pts'}
                            </button>
                        </div>
                    `;
                });
            }

            // Load transactions
            const transSnap = await db.collection(`merchants/${merchantId}/transactions`)
                .where('customerId', '==', customerId)
                .orderBy('createdAt', 'desc')
                .limit(10)
                .get();

            if (!transSnap.empty) {
                const container = document.getElementById('card-transactions');
                container.innerHTML = '';
                transSnap.forEach(doc => {
                    const t = doc.data();
                    const date = t.createdAt ? t.createdAt.toDate().toLocaleDateString('it-IT') : '';
                    container.innerHTML += `
                        <div class="transaction-item">
                            <div class="transaction-info">
                                <h4>${t.type === 'earn' ? 'Acquisto' : 'Riscatto premio'}</h4>
                                <p>${date}</p>
                            </div>
                            <span class="transaction-points">${t.type === 'earn' ? '+' : '-'}${t.points}</span>
                        </div>
                    `;
                });
            }
        }

        function applyBranding(merchant) {
            const WHITELABEL_PLANS = ['pro', 'business'];
            const plan = merchant.plan || 'starter';
            const branding = merchant.branding || {};
            if (!WHITELABEL_PLANS.includes(plan)) return;

            if (branding.logoUrl) {
                const img = document.getElementById('card-merchant-logo');
                img.src = branding.logoUrl;
                img.alt = merchant.businessName || '';
                img.style.display = 'block';
            }
            if (branding.primaryColor && /^#[0-9a-fA-F]{6}$/.test(branding.primaryColor)) {
                const primary = branding.primaryColor;
                const dark = shadeColor(primary, -45);
                const mid = shadeColor(primary, -25);
                const app = document.querySelector('.card-app');
                if (app) app.style.background = `linear-gradient(135deg, ${dark} 0%, ${mid} 50%, ${primary} 100%)`;
                const meta = document.querySelector('meta[name="theme-color"]');
                if (meta) meta.setAttribute('content', dark);
            }
            if (branding.hideFidelaiBranding) {
                const footer = document.getElementById('powered-by');
                if (footer) footer.style.display = 'none';
            }
        }

        function shadeColor(hex, percent) {
            const n = parseInt(hex.slice(1), 16);
            const r = (n >> 16) & 0xff, g = (n >> 8) & 0xff, b = n & 0xff;
            const p = percent / 100;
            const adj = (c) => {
                const v = p < 0 ? c * (1 + p) : c + (255 - c) * p;
                return Math.max(0, Math.min(255, Math.round(v)));
            };
            return '#' + [adj(r), adj(g), adj(b)].map(x => x.toString(16).padStart(2, '0')).join('');
        }

        function getLevel(points) {
            const levels = [
                { name: 'Bronze', min: 0, next: 500, nextName: 'Silver' },
                { name: 'Silver', min: 500, next: 1500, nextName: 'Gold' },
                { name: 'Gold', min: 1500, next: 5000, nextName: 'Platinum' },
                { name: 'Platinum', min: 5000, next: null, nextName: null }
            ];
            let current = levels[0];
            for (const lvl of levels) {
                if (points >= lvl.min) current = lvl;
            }
            return current;
        }

        function renderDemo() {
            const brandDemo = params.get('brand') === 'custom';
            if (brandDemo) {
                applyBranding({
                    plan: 'pro',
                    businessName: 'Caffè Aurora',
                    branding: {
                        logoUrl: "data:image/svg+xml;utf8," + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 60"><rect width="120" height="60" rx="12" fill="#0F766E"/><text x="60" y="38" font-family="Inter,sans-serif" font-size="22" font-weight="800" fill="#FEF3C7" text-anchor="middle">AURORA</text></svg>'),
                        primaryColor: '#0F766E',
                        hideFidelaiBranding: true
                    }
                });
                document.getElementById('card-merchant-name').textContent = 'Caffè Aurora';
            } else {
                document.getElementById('card-merchant-name').textContent = 'Bar Roma';
            }
            document.getElementById('card-customer-name').textContent = 'Marco Rossi';
            document.getElementById('card-points').textContent = '1.250';
            document.getElementById('card-level').textContent = 'Silver ⭐';
            document.getElementById('card-progress-fill').style.width = '83%';
            document.getElementById('card-progress-text').textContent = '1.250 / 1.500 punti per Gold';

            document.getElementById('card-rewards').innerHTML = `
                <div class="reward-item">
                    <div class="reward-info"><h4>Caffè omaggio</h4><p>100 punti</p></div>
                    <button class="reward-btn available">Riscatta</button>
                </div>
                <div class="reward-item">
                    <div class="reward-info"><h4>Sconto 10%</h4><p>500 punti</p></div>
                    <button class="reward-btn available">Riscatta</button>
                </div>
                <div class="reward-item">
                    <div class="reward-info"><h4>Prodotto gratis</h4><p>1.000 punti</p></div>
                    <button class="reward-btn available">Riscatta</button>
                </div>
            `;

            document.getElementById('card-transactions').innerHTML = `
                <div class="transaction-item">
                    <div class="transaction-info"><h4>Acquisto</h4><p>12/04/2026</p></div>
                    <span class="transaction-points">+25</span>
                </div>
                <div class="transaction-item">
                    <div class="transaction-info"><h4>Acquisto</h4><p>10/04/2026</p></div>
                    <span class="transaction-points">+18</span>
                </div>
                <div class="transaction-item">
                    <div class="transaction-info"><h4>Riscatto premio</h4><p>08/04/2026</p></div>
                    <span class="transaction-points">-100</span>
                </div>
                <div class="transaction-item">
                    <div class="transaction-info"><h4>Acquisto</h4><p>05/04/2026</p></div>
                    <span class="transaction-points">+32</span>
                </div>
            `;
        }

        loadCard();
    </script>

    <!-- Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js')
                .then(reg => console.log('SW registered, scope:', reg.scope))
                .catch(err => console.warn('SW registration failed:', err));
        }
    </script>

</body>
</html>
